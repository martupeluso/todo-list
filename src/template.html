<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
  </head>
  <body>
    <div class="sidebar left">
      <h1>To<span>do</span> List</h1>
      <hr>
      <button class="add-new-todo">
        <img src="./assets/icons/plus-circle-accent.svg" alt="" width="24"
          height="24">
        <span>Add new todo</span></button>
      <ul>
        <li class="inbox">Inbox</li>
        <li class="today">Today</li>
        <li class="upcoming">Upcoming</li>
      </ul>
      <div class="filters">
        <h2>Filters</h2>
        <hr>
      </div>
      <ol>
        <li class="p1">Priority 1</li>
        <li class="p2">Priority 2</li>
        <li class="p3">Priority 3</li>
      </ol>
      <div class="projects">
        <div>
          <h2>Projects</h2>
          <img src="./assets/icons/plus-circle.svg" alt="" width="20"
            height="20">
        </div>
        <hr>
      </div>
      <ul class="projects-list"></ul>
    </div>
    <div class="main">
      <div class="main-header">
        <h2 class="project-name">Inbox</h2>
        <div class="sort-options">
          <span>Sort by:</span>
          <ul>
            <li class="sort-name">Name</li>
            <li class="sort-date">Date</li>
            <li class="sort-priority">Priority</li>
          </ul>
        </div>
      </div>
      <div>
        <ul class="todos"></ul>
      </div>
    </div>
    <div class="sidebar right">
      <h2>Completed</h2>
      <ul class="completed-todos"></ul>
    </div>
    <div class="theme-picker">
      <button class="light-theme"><img src="./assets/icons/sun.svg"
          alt=""></button>
      <button class="dark-theme"><img src="./assets/icons/moon.svg"
          alt=""></button>
    </div>
    <dialog class="modal">
      <form method="dialog">
        <div class="dialog-header">
          <input type="text" placeholder="Todo title" id="title" name="title">
          <img src="./assets/icons/x.svg" alt="" class="cancel">
          <img src="./assets/icons/check.svg" alt="" class="confirm">
        </div>
        <textarea placeholder="Description" id="description"
          name="description"></textarea>
        <div class="todo-info">
          <span>Date: </span>
          <input type="datetime-local" name="datetime" id="datetime">
          <span>Project: </span>
          <select name="project" id="project">
            <option value="Inbox">Inbox</option>
          </select>
          <span>Priority: </span>
          <select name="priority" id="priority">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>
      </form>
    </dialog>
  </body>
</html>
