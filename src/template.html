<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
  </head>
  <body>
    <div class="left-sidebar">
      <h1>To<span>do</span> List</h1>
      <hr>
      <button>Add new todo</button>
      <ul>
        <li class="inbox">Inbox</li>
        <li class="today">Today</li>
        <li class="upcoming">Upcoming</li>
      </ul>
      <h2>Filters</h2>
      <hr>
      <ol>
        <li class="p1">Priority 1</li>
        <li class="p2">Priority 2</li>
        <li class="p3">Priority 3</li>
      </ol>
      <h2>Lists</h2>
      <hr>
      <ul class="projects-list"></ul>
    </div>
    <div class="main">
      <div class="main-header">
        <h2 class="project-name">Inbox</h2>
        <div>
          <span>Sort by:</span>
          <ul>
            <li class="sort-name">Name</li>
            <li class="sort-date">Date</li>
            <li class="sort-priority">Priority</li>
          </ul>
        </div>
      </div>
      <div>
        <ul class="todos"></ul>
      </div>
    </div>
    <div class="right-sidebar">
      <h2>Completed</h2>
      <ul class="completed-todos"></ul>
    </div>
  </body>
</html>
