<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
  </head>
  <body>
    <div class="sidebar left">
      <h1>To<span>do</span> List</h1>
      <hr>
      <button class="add-new-todo">
        <img src="./assets/icons/plus-circle-accent.svg" alt="" width="24"
          height="24">
        <span>Add new todo</span></button>
      <ul>
        <li class="inbox">Inbox</li>
        <li class="today">Today</li>
        <li class="upcoming">Upcoming</li>
      </ul>
      <div class="filters">
        <h2>Filters</h2>
        <hr>
      </div>
      <ol class="filters-list">
        <li class="p1">Priority 1</li>
        <li class="p2">Priority 2</li>
        <li class="p3">Priority 3</li>
        <li class="p4">Priority 4</li>
      </ol>
      <div class="projects">
        <div>
          <h2>Projects</h2>
          <img src="./assets/icons/plus-circle.svg" alt="" width="20"
            height="20">
        </div>
        <hr>
      </div>
      <ul class="projects-list"></ul>
    </div>
    <div class="main">
      <div class="main-header">
        <h2 class="project-name">Inbox</h2>
        <div class="sort-options">
          <span>Sort by:</span>
          <ul>
            <li class="sort-name">
              <label for="name">
                <input type="radio" name="sort-options" id="name" value="Name"
                  checked>
                Name
              </label>
            </li>
            <li class="sort-date">
              <label for="date">
                <input type="radio" name="sort-options" id="date" value="Date">
                Date
              </label>
            </li>
            <li class="sort-priority">
              <label for="prio">
                <input type="radio" name="sort-options" id="prio"
                  value="Priority">
                Priority
              </label>
            </li>
          </ul>
        </div>
      </div>
      <div>
        <ul class="todos"></ul>
      </div>
    </div>
    <div class="sidebar right">
      <h2>Completed</h2>
      <ul class="completed-todos"></ul>
    </div>
    <div class="theme-picker">
      <button class="light-theme"><img src="./assets/icons/sun.svg"
          alt=""></button>
      <button class="dark-theme"><img src="./assets/icons/moon.svg"
          alt=""></button>
    </div>
    <dialog class="modal">
      <form method="dialog">
        <div class="dialog-header">
          <input type="text" placeholder="Todo title" id="title" name="title"
            required>
          <img src="./assets/icons/x.svg" alt="" class="cancel">
          <button type="submit"><img src="./assets/icons/check.svg" alt=""
              class="confirm"></button>
        </div>
        <textarea placeholder="Description" id="description"
          name="description"></textarea>
        <div class="todo-info">
          <label for="datetime">Date: </label>
          <input type="datetime-local" name="datetime" id="datetime">
          <label for="project-choice">Project: </label>
          <input list="project" name="project-choice" id="project-choice"
            placeholder="Inbox">
          <datalist id="project">
            <option value="Inbox">Inbox</option>
          </datalist>
          <label for="priority">Priority: </label>
          <select name="priority" id="priority">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
          </select>
        </div>
      </form>
    </dialog>
    <dialog class="modal delete-modal">
      <p>Are you sure you want to delete this?</p>
      <div>
        <button class="cancel-button">Cancel</button>
        <button class="delete-button">Delete</button>
      </div>
    </dialog>
  </body>
</html>
